name: Build my image


on:
    push:
        branches: 
            - main

jobs:
    build_docker_image:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4


            - name: Configure AWS credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ secrets.AWS_REGION }}

            - name: Login to Amazon ECR
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2
            
            - name: Create ECR repository
              run: |
                aws ecr describe-repositories --repository-names ${{ secrets.ECR_REPOSITORY }} || \
                aws ecr create-repository --repository-name ${{ secrets.ECR_REPOSITORY }} --image-scanning-configuration scanOnPush=true

            - name: Setup docker build
              uses: docker/setup-buildx-action@v4

            - name: Build and push
              id: build
              uses: docker/build-push-action@v6
              continue-on-error: true
              with:
                context: .
                file: ./Dockerfile
                push: true
                tags: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_REPOSITORY }}:latest

        


